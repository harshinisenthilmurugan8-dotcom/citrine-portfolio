<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>

  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/hithismani/responsive-decap@main/dist/responsive.css">

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" type="text/javascript"></script>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.2/dist/decap-cms.js" type="text/javascript"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init({
        APIUrl: "https://vinodnaraen.com/.netlify/identity"
      });
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.reload();
          });
        }
      });
    }
  </script>
</body>

</html>
